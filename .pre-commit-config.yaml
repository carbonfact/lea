repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff linter
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff formatter
        entry: uv run ruff format
        language: system
        types: [python]
      - id: ty
        name: ty type checker
        entry: uv run ty check lea
        language: system
        types: [python]
        pass_filenames: false
